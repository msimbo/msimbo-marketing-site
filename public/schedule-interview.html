<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule Your Interview — ULEM Revenue Technology Specialist Program</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/assets/ulem-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #CC0000;
      --dark: #1A1A1A;
      --off-white: #F5F5F5;
      --white: #FFFFFF;
      --gray-light: #DDDDDD;
      --gray-mid: #555555;
      --rose: #F5EDED;
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-display: 'Instrument Serif', Georgia, 'Times New Roman', serif;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      color: var(--dark);
      background: var(--off-white);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px 48px;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header__logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      display: block;
    }

    .header__eyebrow {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray-mid);
      margin-bottom: 12px;
    }

    .header__headline {
      font-family: var(--font-display);
      font-size: 1.75rem;
      line-height: 1.2;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .header__rule {
      width: 60px;
      height: 3px;
      background: var(--red);
      margin: 12px auto 16px;
      border: none;
    }

    .header__sub {
      font-size: 0.95rem;
      color: var(--gray-mid);
      line-height: 1.55;
      max-width: 480px;
      margin: 0 auto;
    }

    .widget-card {
      background: var(--white);
      border-radius: 12px;
      padding: 24px 16px;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
      margin-bottom: 32px;
    }

    .calendarhero-inline-widget {
      min-width: 100% !important;
      width: 100% !important;
      border: none;
    }

    .footer {
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    .footer__contact {
      font-size: 0.85rem;
      color: var(--gray-mid);
      margin-bottom: 8px;
    }

    .footer__contact a {
      color: var(--red);
      text-decoration: none;
      font-weight: 500;
    }

    .footer__contact a:hover {
      border-bottom: 1px solid var(--red);
    }

    .footer__back {
      font-size: 0.85rem;
      color: var(--gray-mid);
      text-decoration: none;
      border-bottom: 1px solid var(--gray-light);
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .footer__back:hover {
      color: var(--dark);
      border-color: var(--dark);
    }

    @media (min-width: 640px) {
      .page { padding: 56px 32px 64px; }
      .header__headline { font-size: 2rem; }
      .widget-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <img src="/assets/ulem-logo.png" alt="Urban League of Eastern Massachusetts" class="header__logo" width="48" height="48">
      <p class="header__eyebrow">Revenue Technology Specialist Program</p>
      <h1 class="header__headline">Schedule Your 1-on-1 Interview</h1>
      <div class="header__rule" aria-hidden="true"></div>
      <p class="header__sub">You've completed your assessment &mdash; now pick a time for your interview. Choose a slot that works best for you.</p>
    </div>

    <div class="widget-card">
      <!-- CalendarHero inline embed script begin -->
      <div class="calendarhero-inline-widget" data-url="https://meeting.calendarhero.com/meeting/new/5f73c9d71fcac30020b0cfc7/msimbointake" style="min-width:320px; height:630px;"></div>
      <script type="text/javascript" src="https://app.calendarhero.com/assets/widget.js"></script>
      <!-- CalendarHero inline embed script end -->
    </div>

    <div class="footer">
      <p class="footer__contact">Questions? Call <a href="tel:+16174421075">(617) 442-1075</a> or email <a href="mailto:program-rts@ulem.org">program-rts@ulem.org</a></p>
    </div>
  </div>
</body>
</html>
